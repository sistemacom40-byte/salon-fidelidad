<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Ingresar PIN</title>
  <style>
    body {
      margin: 0;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      background: linear-gradient(160deg, #e7ddc2, #c9bd97);
      font-family: sans-serif;
    }
    .box {
      background: white;
      padding: 32px;
      border-radius: 16px;
      text-align: center;
      width: 280px;
    }
    input {
      font-size: 28px;
      text-align: center;
      letter-spacing: 12px;
      width: 100%;
      padding: 10px;
      margin: 16px 0;
      border: 1px solid #ccc;
      border-radius: 8px;
    }
    button {
      width: 100%;
      padding: 12px;
      background: #3f7a3a;
      color: white;
      border: none;
      border-radius: 8px;
      font-size: 16px;
    }
    .error { color: #b23; font-size: 14px; }
  </style>
</head>
<body>
  <div class="box">
    <h2>🍃 Salón de Fidelidad</h2>
    <p>Ingresa el PIN del personal</p>
    <form method="POST">
      <input type="password" name="pin" maxlength="4" autofocus>
      <button type="submit">Entrar</button>
    </form>
    {% if error %}
      <p class="error">{{ error }}</p>
    {% endif %}
  </div>
</body>
</html>
