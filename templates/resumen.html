<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Resumen del Salón</title>
  <style>
    body {
      margin: 0; min-height: 100vh;
      background: linear-gradient(160deg, #e7ddc2, #c9bd97);
      font-family: sans-serif;
      display: flex; align-items: center; justify-content: center;
      padding: 24px 14px;
    }
    .box { background: white; padding: 28px; border-radius: 16px; width: 320px; max-width: 100%; text-align: center; }
    .numero {
      font-size: 48px;
      font-weight: 700;
      color: #3f7a3a;
      margin: 10px 0;
    }
    .etiqueta {
      font-size: 14px;
      color: #7c7562;
      text-transform: uppercase;
      font-weight: 600;
    }
    a { display: block; text-align: center; margin-top: 20px; font-size: 13px; color: #555; }
  </style>
</head>
<body>
  <div class="box">
    <h2>📊 Resumen</h2>
    <p class="etiqueta">Tarjetas activas</p>
    <p class="numero">{{ total }}</p>
    <a href="{{ url_for('panel') }}">← Volver al panel</a>
  </div>
</body>
</html>
