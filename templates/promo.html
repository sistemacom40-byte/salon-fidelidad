<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Promoción del día</title>
  <style>
    body {
      margin: 0; min-height: 100vh;
      background: linear-gradient(160deg, #e7ddc2, #c9bd97);
      font-family: sans-serif;
      display: flex; align-items: center; justify-content: center;
      padding: 24px 14px;
    }
    .box { background: white; padding: 28px; border-radius: 16px; width: 320px; max-width: 100%; }
    input, select {
      width: 100%; padding: 12px; font-size: 16px;
      border: 1px solid #ccc; border-radius: 8px; margin: 10px 0;
      box-sizing: border-box;
    }
    button {
      width: 100%; padding: 12px; background: #3f7a3a; color: white;
      border: none; border-radius: 8px; font-size: 16px;
      margin-top: 4px;
    }
    .btn-eliminar {
      background: white; color: #b23; border: 1px solid #e5b8b8;
    }
    .mensaje-ok {
      background: #d4edda;
      color: #1e5c2f;
      padding: 8px;
      border-radius: 8px;
      text-align: center;
      font-size: 13px;
      font-weight: 600;
      margin-bottom: 10px;
    }
    a { display: block; text-align: center; margin-top: 14px; font-size: 13px; color: #555; }
  </style>
</head>
<body>
  <div class="box">
    <h2>📣 Promo del día</h2>

    {% if guardado %}
      <p class="mensaje-ok">✅ Promoción actualizada correctamente</p>
    {% endif %}

    <form method="POST">
      <input type="text" name="mensaje" placeholder="Ej: Hoy 20% en manicure" value="{{ mensaje_actual }}">
      <select name="dias">
        <option value="1">Válida solo hoy</option>
        <option value="3">Válida 3 días</option>
        <option value="7">Válida 1 semana</option>
      </select>
      <button type="submit" name="accion" value="guardar">Guardar promoción</button>
    </form>
    <form method="POST">
      <button type="submit" name="accion" value="eliminar" class="btn-eliminar">🗑️ Eliminar promoción actual</button>
    </form>
    <a href="{{ url_for('panel') }}">← Volver al panel</a>
  </div>
</body>
</html>
