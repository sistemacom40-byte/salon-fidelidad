<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Promoción del día</title>
  <style>
    body {
      margin: 0; min-height: 100vh;
      background: linear-gradient(160deg, #e7ddc2, #c9bd97);
      font-family: sans-serif;
      display: flex; align-items: center; justify-content: center;
      padding: 24px 14px;
    }
    .box { background: white; padding: 28px; border-radius: 16px; width: 320px; max-width: 100%; margin-bottom: 16px; }
    input, select {
      width: 100%; padding: 12px; font-size: 16px;
      border: 1px solid #ccc; border-radius: 8px; margin: 10px 0;
      box-sizing: border-box;
    }
    label { font-size: 13px; color: #555; font-weight: 600; }
    button {
      width: 100%; padding: 12px; background: #3f7a3a; color: white;
      border: none; border-radius: 8px; font-size: 16px;
      margin-top: 4px;
    }
    .btn-eliminar {
      background: white; color: #b23; border: 1px solid #e5b8b8;
    }
    .mensaje-ok {
      background: #d4edda;
      color: #1e5c2f;
      padding: 10px;
      border-radius: 8px;
      text-align: center;
      font-size: 13px;
      font-weight: 600;
      margin-bottom: 12px;
      width: 320px;
      max-width: 100%;
      box-sizing: border-box;
    }
    a { display: block; text-align: center; margin-top: 14px; font-size: 13px; color: #555; }
    .columna { display: flex; flex-direction: column; gap: 24px; align-items: center; }
  </style>
</head>
<body>
  <div class="columna">

    {% with mensajes = get_flashed_messages() %}
      {% if mensajes %}
        {% for m in mensajes %}
          <p class="mensaje-ok">{{ m }}</p>
        {% endfor %}
      {% endif %}
    {% endwith %}

    <div class="box">
      <h2>📣 Promo del día</h2>

      <form method="POST" action="{{ url_for('promo') }}">
        <label>Mensaje de la promoción</label>
        <input type="text" name="mensaje" placeholder="Ej: Hoy 20% en manicure" value="{{ promo.mensaje if promo else '' }}">

        <label>Desde</label>
        <input type="date" name="fecha_inicio" value="{{ promo.fecha_inicio[:10] if promo and promo.fecha_inicio else '' }}">

        <label>Hasta</label>
        <input type="date" name="fecha_fin" value="{{ promo.fecha_fin[:10] if promo and promo.fecha_fin else '' }}">

        <button type="submit">Guardar promoción</button>
      </form>

      <form method="POST" action="{{ url_for('promo') }}">
        <input type="hidden" name="mensaje" value="">
        <input type="hidden" name="fecha_inicio" value="">
        <input type="hidden" name="fecha_fin" value="">
        <button type="submit" class="btn-eliminar">🗑️ Eliminar promoción actual</button>
      </form>
    </div>

    <div class="box">
      <h2>📱 WhatsApp del salón</h2>

      <form method="POST" action="{{ url_for('configuracion') }}">
        <label>Número de WhatsApp (con código de país)</label>
        <input type="text" name="wa_numero" placeholder="Ej: 50212345678" value="{{ wa_numero }}">

        <label>Mensaje predeterminado</label>
        <input type="text" name="wa_mensaje" placeholder="Hola, vi la promo y quiero más info" value="{{ wa_mensaje }}">

        <button type="submit">Guardar WhatsApp</button>
      </form>
    </div>

    <a href="{{ url_for('panel') }}">← Volver al panel</a>
  </div>
</body>
</html>
