<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Panel del Salón</title>
  <style>
    body {
      margin: 0; min-height: 100vh;
      background: linear-gradient(160deg, #e7ddc2, #c9bd97);
      font-family: sans-serif;
      display: flex; align-items: center; justify-content: center;
      padding: 24px 14px;
    }
    .box { background: white; padding: 28px; border-radius: 16px; width: 320px; max-width: 100%; }
    input {
      width: 100%; padding: 12px; font-size: 16px;
      border: 1px solid #ccc; border-radius: 8px; margin: 10px 0;
      box-sizing: border-box;
    }
    button {
      width: 100%; padding: 12px; background: #3f7a3a; color: white;
      border: none; border-radius: 8px; font-size: 16px;
    }
    .hint { font-size: 12px; color: #888; margin-top: -4px; margin-bottom: 10px; }
  </style>
</head>
<body>
  <div class="box">
    <h2>🍃 Buscar clienta</h2>
    <form method="POST">
      <input type="tel" name="celular" placeholder="Número de celular" required>
      <input type="text" name="nombre" placeholder="Nombre (solo si es nueva)">
      <p class="hint">Si la clienta ya existe, este nombre se ignora.</p>
      <button type="submit">Buscar / Registrar visita</button>
    </form>
  </div>
</body>
</html>
